name: Frontend CI

on:
  push:
    branches: [main]
    paths:
      - "apps/frontend/**"
  pull_request:
    branches: [main]
    paths:
      - "apps/frontend/**"

permissions:
  contents: read
  packages: write
  pull-requests: write

jobs:
  build:
    name: Build & Check
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: apps/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run check

      - name: Build
        run: npm run build

      - name: Log in to the Container registry
        if: github.event_name == 'push'
        uses: docker/login-action@v3.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Repository name to lowercase
        if: github.event_name == 'push'
        id: repo
        run: echo "name=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        if: github.event_name == 'push'
        id: push
        uses: docker/build-push-action@v6.5.0
        with:
          context: ./apps/frontend
          push: true
          tags: ghcr.io/${{ steps.repo.outputs.name }}-frontend:latest

      - name: Deploy the app
        if: github.event_name == 'push'
        uses: digitalocean/app_action/deploy@v2
        env:
          SAMPLE_DIGEST: ${{ steps.push.outputs.digest }}
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN_ }}

      - name: Build Docker image (PR check)
        if: github.event_name == 'pull_request'
        working-directory: apps/frontend
        run: docker build -t peelin-frontend:test .

      - name: Deploy PR preview
        if: github.event_name == 'pull_request'
        id: deploy
        uses: digitalocean/app_action/deploy@v2
        with:
          deploy_pr_preview: "true"
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN_ }}

      - name: Comment preview URL on PR
        if: github.event_name == 'pull_request' && success()
        uses: actions/github-script@v7
        env:
          BUILD_LOGS: ${{ steps.deploy.outputs.build_logs }}
          DEPLOY_LOGS: ${{ steps.deploy.outputs.deploy_logs }}
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🚀 Frontend preview deployed at ${{ fromJson(steps.deploy.outputs.app).live_url }}`
            })

      - name: Comment failure on PR
        if: github.event_name == 'pull_request' && failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `Frontend deploy failed. [View logs](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})`
            })
