spring:
  application:
    name: Peelin' Good

  config:
    import: optional:file:.env.local[.properties]

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  # 🔥 DISABLE REDIS COMPLETELY
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

  jpa:
    open-in-view: false

# 🔥 REMOVE OAUTH COMPLETELY FOR LOCAL RUN
# (this was crashing your app due to missing client IDs)

app:
  jwt:
    secret: ${JWT_SECRET:dev-secret-key-for-local-development-only-32b}
    expiration: ${JWT_EXPIRATION:864000000}
    issuer: ${JWT_ISSUER:peelin-good}

  cors:
    allowed-origins: ${APP_CORS_ORIGINS:http://localhost:3000,http://localhost:8080,http://10.0.2.2:8080,http://localhost:5173}

  resend:
    enabled: ${RESEND_ENABLED:false}
    api-key: ${RESEND_API_KEY:}
    from-email: onboarding@resend.dev

  frontend:
    url: ${FRONTEND_URL:http://localhost:5173}

management:
  endpoints:
    web:
      exposure:
        include: health

# 🔥 DISABLE SENTRY COMPLETELY (no noise, no issues)
sentry:
  dsn: ""
  enabled: false